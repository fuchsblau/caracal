name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Blocking jobs: bandit, dependency-audit (failures prevent merge).
# Non-blocking: secrets-scan (continue-on-error until baseline is established).
jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool run bandit -r caracal/ -ll

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pip-audit

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool run detect-secrets scan --all-files --exclude-files '\.git/.*' | python -c "import sys,json; r=json.load(sys.stdin); results=r.get('results',{}); print(f'Found {sum(len(v) for v in results.values())} potential secrets in {len(results)} files') if results else print('No secrets detected'); sys.exit(1 if results else 0)"
    continue-on-error: true
